<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="50%" style="stop-color:#132A4A"/>
      <stop offset="100%" style="stop-color:#0F1F3A"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <pattern id="diagonal" width="80" height="80" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="40" height="80" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <rect width="800" height="600" fill="url(#diagonal)"/>
  <rect width="800" height="600" fill="url(#glow)"/>
  <g transform="translate(400, 260)">
    <rect x="-60" y="-40" width="120" height="3" rx="1.5" fill="#C9A96E" opacity="0.3"/>
    <text x="0" y="0" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#C9A96E" text-anchor="middle" opacity="0.5" letter-spacing="4">RRC</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="11" fill="#C9A96E" text-anchor="middle" opacity="0.25" letter-spacing="6" text-transform="uppercase">Architectural Project</text>
  </g>
</svg>
